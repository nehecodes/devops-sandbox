version: "3.9"

networks:
  sandbox-core:
    name: sandbox-core
    driver: bridge

volumes:
  nginx-conf:
  logs-data:

services:
  nginx:
    image: nginx:alpine
    container_name: sandbox-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - logs-data:/var/log/nginx
    networks:
      - sandbox-core
    labels:
      sandbox.managed: "true"
      sandbox.role: "nginx"
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: sandbox-api
    restart: unless-stopped
    ports:
      - "5050:5050"
    volumes:
      - ./platform:/app/platform
      - ./envs:/app/envs
      - ./logs:/app/logs
      - ./nginx/conf.d:/app/nginx/conf.d
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - API_PORT=5050
      - FLASK_DEBUG=${FLASK_DEBUG:-false}
    networks:
      - sandbox-core
    labels:
      sandbox.managed: "true"
      sandbox.role: "api"
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Optional: Prometheus monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: sandbox-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    volumes:
      - ./monitor/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - sandbox-core
    labels:
      sandbox.managed: "true"
      sandbox.role: "prometheus"

  # Optional: Grafana dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: sandbox-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-sandbox123}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - sandbox-core
    labels:
      sandbox.managed: "true"
      sandbox.role: "grafana"
    depends_on:
      - prometheus
